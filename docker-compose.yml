name: sentiric

networks:
  sentiric-net:
    driver: bridge

volumes:
  #   xxx_yyy_service_data:
  infra_rabbitmq_data:
  infra_minio_data:

  image_sdxl_models:

x-gpu-deploy: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [ gpu, compute, utility ]

services:

  # =============================================================
  # TEMEL ALTYAPI (INFRASTRUCTURE)
  # Platformun temel yapı taşları.
  # =============================================================
  rabbitmq:

    image: ghcr.io/sentiric/sentiric-rabbitmq:latest

    environment:
      # --- GLOBAL ---
      - ENV=${ENV:-production}
      # Node.js uygulamaları genellikle NODE_ENV'ye bakarlar, bu yüzden onu da ekleyelim.
      - NODE_ENV=${ENV:-production}
      # RUST ICIN RUST_LOG ve LOG_FORMAT değişkenlerine bakarlar. LOG_LEVEL değişkenini hiç okumazlar.
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Observer için JSON şarttır
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # Container çalıştığı fiziksel makina ismi
      - NODE_HOSTNAME=${NODE_HOSTNAME:-rabbitmq}

      - RABBITMQ_DEFAULT_USER=sentiric
      - RABBITMQ_DEFAULT_PASS=sentiric_pass
      # error: RABBITMQ_VM_MEMORY_HIGH_WATERMARK is set but deprecated
      #- RABBITMQ_VM_MEMORY_HIGH_WATERMARK=0.4

    volumes:
      - "../sentiric-certificates:/sentiric-certificates:ro"
      - infra_rabbitmq_data:/var/lib/rabbitmq/

    container_name: rabbitmq

    networks:
      sentiric-net:

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      # healthcheck: 30 saniye
      # DLX tanımlamaları startup süresini 1-2 saniye uzatabilir.
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]

  # 🏪 MINIO SERVICE (Object Storage)
  minio:

    image: ghcr.io/sentiric/sentiric-minio:latest

    environment:
      # --- GLOBAL ---
      - ENV=${ENV:-production}
      # Node.js uygulamaları genellikle NODE_ENV'ye bakarlar, bu yüzden onu da ekleyelim.
      - NODE_ENV=${ENV:-production}
      # RUST ICIN RUST_LOG ve LOG_FORMAT değişkenlerine bakarlar. LOG_LEVEL değişkenini hiç okumazlar.
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Observer için JSON şarttır
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # Container çalıştığı fiziksel makina ismi
      - NODE_HOSTNAME=${NODE_HOSTNAME:-minio}

      - MINIO_FS_STAT_CACHE_LIMIT=0
      - MINIO_ROOT_USER=sentiric
      - MINIO_ROOT_PASSWORD=sentiric-secret-key
    volumes:
      - "../sentiric-certificates:/sentiric-certificates:ro"
      - infra_minio_data:/data

    container_name: minio

    networks:
      sentiric-net:

    ports:
      - "9000:9000"
      - "9001:9001"

    command: server /data --console-address ":9001"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/ready" ]

  # ----------------------------------------------------
  # MİNİO BAŞLATICI (Otomatik Bucket ve İzin Yaratıcı)
  # ----------------------------------------------------
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - sentiric-net
    entrypoint: >
      /bin/sh -c " sleep 3; mc alias set myminio http://minio:9000 sentiric sentiric-secret-key; mc mb myminio/sentiric --ignore-existing; mc anonymous set download myminio/sentiric; echo '✅ MinIO Bucket (sentiric) successfully initialized and set to public read.'; "

  # =======================================================
  # 2. EXPERT ENGINES (UZMAN MOTORLAR - GPU/PYTHON)
  # =======================================================
  image-sdxl-service:

    <<: *gpu-deploy

    build:
      context: .
      dockerfile: Dockerfile

    env_file: [ .env ]

    environment:
      - ENV=development
      - SDXL_MODEL_ID=stabilityai/sd-turbo
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - TENANT_ID=sentiric_demo
      - GRPC_TLS_CA_PATH=/sentiric-certificates/certs/ca.crt
      - SDXL_SERVICE_CERT_PATH=/sentiric-certificates/certs/image-sdxl-service-chain.crt
      - SDXL_SERVICE_KEY_PATH=/sentiric-certificates/certs/image-sdxl-service.key
      - BUCKET_ENDPOINT_URL=http://minio:9000
      - BUCKET_ACCESS_KEY_ID=sentiric
      - BUCKET_SECRET_ACCESS_KEY=sentiric-secret-key
      - BUCKET_NAME=sentiric
      - RABBITMQ_URL=amqp://sentiric:sentiric_pass@rabbitmq:5672/%2f

    volumes:
      - "../sentiric-certificates:/sentiric-certificates:ro"
      - image_sdxl_models:/app/model-cache

    container_name: image-sdxl-service

    networks:
      - sentiric-net

    ports:
      - "16210:16210" # HTTP
      - "16211:16211" # gRPC
    # depends_on:
    #   rabbitmq:
    #     condition: service_healthy
    #   minio:
    #     condition: service_healthy
