name: image-local-dev

networks:
  local-net:
    driver: bridge

volumes:
  local_rabbitmq_data_image:
  local_minio_data_image:
  local_image_sdxl_model_cache:

services:
  rabbitmq:
    image: ghcr.io/sentiric/sentiric-rabbitmq:latest
    container_name: local-rabbitmq-image
    environment:
      - RABBITMQ_DEFAULT_USER=sentiric
      - RABBITMQ_DEFAULT_PASS=sentiric_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - local-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: ghcr.io/sentiric/sentiric-minio:latest
    container_name: local-minio-image
    environment:
      - MINIO_ROOT_USER=sentiric
      - MINIO_ROOT_PASSWORD=sentiric-secret-key
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - local-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - local-net
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 sentiric sentiric-secret-key;
      mc mb myminio/sentiric --ignore-existing;
      mc anonymous set download myminio/sentiric;
      echo '✅ Local MinIO Bucket (sentiric) is ready.';
      "

  image-sdxl-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-image-sdxl-service
    environment:
      - ENV=development
      - SDXL_MODEL_ID=stabilityai/sd-turbo
      - GRPC_TLS_CA_PATH=/sentiric-certificates/certs/ca.crt
      - SDXL_SERVICE_CERT_PATH=/sentiric-certificates/certs/image-sdxl-service-chain.crt
      - SDXL_SERVICE_KEY_PATH=/sentiric-certificates/certs/image-sdxl-service.key
      - BUCKET_ENDPOINT_URL=http://minio:9000
      - BUCKET_ACCESS_KEY_ID=sentiric
      - BUCKET_SECRET_ACCESS_KEY=sentiric-secret-key
      - BUCKET_NAME=sentiric
      - RABBITMQ_URL=amqp://sentiric:sentiric_pass@rabbitmq:5672/%2f
    volumes:
      - "../sentiric-certificates:/sentiric-certificates:ro"
      - local_image_sdxl_model_cache:/app/model-cache
    ports:
      - "16210:16210" # HTTP
      - "16211:16211" # gRPC
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - local-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
